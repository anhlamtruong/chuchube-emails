services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: email-manager-backend
    env_file: .env
    environment:
      - FRONTEND_URL=http://localhost
    volumes:
      - uploads-data:/app/data/uploads
      - ./sending_email/assets:/app/sending_email/assets
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
    container_name: email-manager-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads-data:

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: chuchube-emails-backend
    env_file: .env
    environment:
      - FRONTEND_URL=http://localhost
      - OLLAMA_URL=http://ollama:11434
    volumes:
      - ./archive/sending_email/assets:/app/sending_email/assets
      # Shared backup volume — backend needs write access for .trigger file
      - ./backups:/backups
    # Backend not exposed publicly — frontend proxies via nginx
    expose:
      - "8000"
    depends_on:
      ollama:
        condition: service_started
    restart: unless-stopped
    stop_grace_period: 60s # let in-flight email batches finish before SIGKILL
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
    container_name: chuchube-emails-frontend
    ports:
      - "80:80"
      # Uncomment for TLS:
      # - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  ollama:
    image: ollama/ollama:latest
    container_name: chuchube-emails-ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python3 -c "import urllib.request; urllib.request.urlopen(''http://localhost:11434/api/tags'')" || exit 1',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── Automated Backup (pg_dump cron) ──────────────────────────────────
  # Uses the direct Supabase connection (port 5432, NOT the PgBouncer pooler)
  # to run pg_dump on a configurable cron schedule.
  # Backup files are stored in ./backups on the host.
  backup:
    build:
      context: .
      dockerfile: backup/Dockerfile
    container_name: chuchube-emails-backup
    env_file: .env
    environment:
      - BACKUP_DATABASE_URL=${BACKUP_DATABASE_URL}
      - BACKUP_CRON=${BACKUP_CRON:-0 3 * * *}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
      - BACKUP_ENCRYPTION_KEY=${BACKUP_ENCRYPTION_KEY:-}
      - BACKUP_DIR=/backups
    volumes:
      # Backup files persisted on host — NOT mounted into frontend/backend
      - ./backups:/backups
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "test -f /backups/backup_state.json || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 120s

volumes:
  ollama_data:
